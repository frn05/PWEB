<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Atividade 9 - Funções JS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Atividade 9</h1>

    <!-- 1 e 2 -->
    <h2>Números</h2>
    <input type="number" id="n1" placeholder="Número 1">
    <input type="number" id="n2" placeholder="Número 2">
    <input type="number" id="n3" placeholder="Número 3">
    <button onclick="executarNumeros()">Executar</button>

    <!-- 3 -->
    <h2>Palíndromo</h2>
    <input type="text" id="texto" placeholder="Digite uma palavra/frase">
    <button onclick="verificarPalindromo()">Verificar</button>

    <!-- 4 -->
    <h2>Subconjunto</h2>
    <input type="text" id="palavra1" placeholder="Palavra 1">
    <input type="text" id="palavra2" placeholder="Palavra 2">
    <button onclick="verificarSubconjunto()">Verificar</button>

    <!-- 5 -->
    <h2>Data</h2>
    <input type="date" id="data">
    <button onclick="mostrarDia()">Ver dia da semana</button>

    <div id="resultado"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
