<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formas de Criar Objetos</title>
</head>
<body>
    <script>
        var aluno1 = new Object();
        //usando Object
        aluno1.ra = "00001234";
        aluno1.nome = "Guilheme";
        alert(`ra=${aluno1.ra} nome=${aluno1.nome}`);

        var aluno2 = {};
        //usando {}
        aluno2.ra = "1234";
        aluno2["nome"] = "Gabriela";
        alert("ra=" + aluno2.ra + " nome=" + aluno2.nome);
        aluno2["email do aluno"] = "gabriela@gmail.com";
        alert(aluno2["email do aluno"]);

        var aluno3 = { //declaração literal
            ra: "1234567",
            nome: "Marcos", //vírgula opcional
        };
        alert("ra=" + aluno3.ra + " nome=" + aluno3.nome);

        //usando função construtura - this significa público
        function Aluno(ra, nome){
            this.ra = ra;
            this.nome = nome;
            this.MostraDados = function(){
                return "ra=" + this.ra + " nome=" + this.nome;
            }
        }
        var aluno4 = new Aluno("123", "Vitor");
        alert(aluno4.MostraDados());
        alert(aluno4.nome);

        //função construtora sem parâmetros
        function Aluno2(){
            var ra; //"encapsulado-escondido"
            var nome;
            this.setRa = function(value){
                this.ra = value;
            }
            this.getRa = function(){
                return this.ra;
            }
            this.setNome = function(value){
                this.nome = value;
            }
            this.getNome = function(){
                return this.nome;
            }
        }
        var aluno5 = new Aluno2();
        aluno5.setNome("Nickolas");
        aluno5.setRa("234");
        alert("ra=" + aluno5.getRa() + " nome=" + 
            aluno5.getNome());
        
        //herança
        function AlunoADS(){
            var numLab;
            this.setnumLab = function (value){
                this.numLab = value;
            }
            this.getnumLab = function(){
                return this.numLab;
            }
        }
        //herança
        AlunoADS.prototype = new Aluno2();
        var aluno6 = new AlunoADS();
        aluno6.setNome("Maria Luiza");
        aluno6.setRa("123");
        aluno6.setnumLab(5);
        alert(aluno6.getNome() + " " + aluno6.getnumLab());

        //usando class
        class Aluno1 {
            constructor(){
                this._ra;
                this._nome;
            }
            setNome(value){
                this._nome = value;
            }
            getNome(){
                return this._nome;
            }
            setRa (value){
                this._ra = value;
            }
            getRa (){
                return this._ra;
            }
        }
        var objAluno = new Aluno1();
        objAluno.setNome("Eduardo");
        objAluno.setRa('123');
        alert(`nome=${objAluno.getNome()} ra=${objAluno.getRa()}`);

        //herança
        class AlunoADS1 extends Aluno1 {
            constructor(){
                //super chama o construtor da classe pai
                super();
                this._numLab;
            }
            setNumLab(value){
                this._numLab = value;
            }
            getNumLab(){
                return this._numLab;
            }
        }
        var objAlunoADS = new AlunoADS1();
        objAlunoADS.setNome("Caio");
        objAlunoADS.setRa("123");
        objAlunoADS.setNumLab(6);
        alert(`nome=${objAlunoADS.getNome()} ra=${objAlunoADS.getRa()}
            numlab=${objAlunoADS.getNumLab()}`);

        //OUTROS
        //cópia de objetos
        var obj1 = new Object();
        var obj2 = obj1;
        obj1.nome = "Matheus";
        alert(obj2.nome);

        //métodos e atributos - públicos e privados
        class ContaBancaria {
            #cpf; //atributo privado

            constructor(nome, saldoInicial){
                this.nome = nome; //atributo público
                this.saldo = saldoInicial;
            }

            setCpf(value){
                this.cpf = value;
            }
            getCpf(){
                return this.cpf;
            }
            getSaldo(){
                return this.saldo;
            }
            //método público
            depositar(valor){
                this.saldo += valor;
                this.#registrarTransacao(valor);
                //Utilizando o modificador # para método privado
            }

            //método privado
            #registrarTransacao(valor){
                console.log(`Depósito de R$ ${valor}
                Saldo R$ ${this.saldo} para CPF ${this.getCpf()}
                ou ${this.#cpf}`);
            }
        }

        const conta = new ContaBancaria("Gustavo", 1000);
        conta.setCpf(123);
        conta.depositar(50);
        //ver no console se aparece

        //Object.fromEntries é um método
        const arr = [
            ['codigo', 1],
            ['nome', "João"],
            ['idade', 23]
        ];
        const obj = Object.fromEntries(arr);
        alert(obj); //imprime object
        alert(obj.nome); //imprime o nome
        alert(JSON.stringify(obj)); //converte em JSON

        //Object.create() cria um novo objeto utilizando um existente (protótipo)
        //alteração no protótipo altera o novo
        const objEmpresa = {
            empresa: 'ZF do Brasil'
        };
        const funcionario = Object.create(objEmpresa, {
            nome: {value: 'Jorge'},
            endereco: {value: 'Av. São Paulo'}
        });
        console.log(funcionario.empresa); //exibe o nome da empresa
        console.log(funcionario.nome);
        console.log(funcionario.endereco);

        //Object.assign()
        const objNovaEmpresa = {
            empresa: 'ZF do Brasil'
        };
        const objVeiculo = {
            placa: 'XXX 1234'
        };
        const motorista = Object.assign({
            cpf: "123"
        }, objNovaEmpresa, objVeiculo);
        console.log(motorista);
    </script>
</body>
</html>
